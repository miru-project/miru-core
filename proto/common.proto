syntax = "proto3";

package miru;

option go_package = "github.com/miru-project/miru-core/proto";

message ExtensionMeta {
  string name = 1;
  string version = 2;
  string author = 3;
  string license = 4;
  string lang = 5;
  string icon = 6;
  string package = 7;
  string webSite = 8;
  string description = 9;
  repeated string tags = 10;
  string api = 11;
  string error = 12;
  string type = 13;
}

message DownloadProgress {
  int32 progress = 1;
  repeated string names = 2;
  int32 total = 3;
  string status = 4;
  string media_type = 5;
  string current_downloading = 6;
  int32 task_id = 7;
  string title = 8;
  string package = 9;
  string key = 10;
}

message TorrentStats {
  int64 total_down = 1;
  int64 total_up = 2;
}


message AvailableHlsVariant {
  string resolution = 1;
  string url = 2;
  string codec = 3;
}


// Download
message Download {
  int32 id = 1;
  repeated string url = 2;
  map<string, string> headers = 3;
  string package = 4;
  repeated int32 progress = 5;
  string key = 6;
  string title = 7;
  string media_type = 8;
  string status = 9;
  string save_path = 10;
  string date = 11;
  string download_url = 12;
  string detail_url = 13;
}

// Torrent
message TorrentResult {
  string info_hash = 1;
  string name = 2;
  repeated string files = 3;
}
