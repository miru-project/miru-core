syntax = "proto3";

package miru;

option go_package = "github.com/miru-project/miru-core/proto";

message ExtensionListItem {
  string title = 1;
  string url = 2;
  string cover = 3;
  string update = 4;
  map<string, string> headers = 5;
}

message ExtensionFilter {
  string title = 1;
  int32 min = 2;
  int32 max = 3;
  string default = 4;
  map<string, string> options = 5;
}

message ExtensionDetail {
  optional string title = 1;
  optional string cover = 2;
  optional string desc = 3;
  repeated ExtensionEpisodeGroup episodes = 4;
  map<string, string> headers = 5;
}

message ExtensionEpisodeGroup {
  string title = 1;
  repeated ExtensionEpisode urls = 2;
}

message ExtensionEpisode {
  string name = 1;
  string url = 2;
  string update = 3;
  optional string description = 4;
}

message ExtensionMirror {
  string name = 1;
  string url = 2;
}

message ExtensionMirrorGroup {
  string title = 1;
  repeated ExtensionMirror mirrors = 2;
}

message ExtensionBangumiWatchSubtitle {
  optional string language = 1;
  string title = 2;
  string url = 3;
}

message ExtensionBangumiWatchTorrentFileTreeFile {
  int64 length = 1;
  string piecesRoot = 2;
}

message ExtensionBangumiWatchTorrentFileTree {
  ExtensionBangumiWatchTorrentFileTreeFile file = 1;
  map<string, ExtensionBangumiWatchTorrentFileTree> dir = 2;
}

message ExtensionBangumiWatchTorrentDetail {
  optional int32 pieceLength = 1;
  optional string pieces = 2;
  optional string name = 3;
  optional string nameUtf8 = 4;
  optional int64 length = 5;
  optional string source = 6;
  optional int32 metaVersion = 7;
  ExtensionBangumiWatchTorrentFileTree fileTree = 8;
}

message ExtensionBangumiWatchTorrent {
  string infoHash = 1;
  ExtensionBangumiWatchTorrentDetail detail = 2;
  repeated string files = 3;
}

message ExtensionBangumiWatch {
  string type = 1;
  string url = 2;
  repeated ExtensionBangumiWatchSubtitle subtitles = 3;
  map<string, string> headers = 4;
  optional string audioTrack = 5;
  ExtensionBangumiWatchTorrent torrent = 6;
}

message ExtensionMangaWatch {
  repeated string urls = 1;
  map<string, string> headers = 2;
}

message ExtensionFikushonWatch {
  repeated string content = 1;
  string title = 2;
  optional string subtitle = 3;
}


//V2
message ExtensionWatch {
  repeated ExtensionMirrorGroup mirrors = 1;
  optional string default_group = 2;
  optional int32 default_index = 3;
}

message GithubExtension {
  string name = 1;
  optional string description = 2;
  string license = 3;
  string version = 4;
  string author = 5;
  optional string icon = 6;
  string type = 7;
  string lang = 8;
  string webSite = 9;
  bool nsfw = 10;
  string package = 11;
  repeated string tags = 12;
}

message ExtensionRepo {
  repeated GithubExtension extensions = 1;
  string name = 2;
  string url = 3;
}

message RepoConfig {
  string link = 1;
  string name = 2;
  int32 id = 3;
}

enum ExtensionSettingType {
  input = 0;
  radio = 1;
  toggle = 2;
}

message ExtensionSetting {
  int32 id = 1;
  string package = 2;
  string title = 3;
  string key = 4;
  optional string value = 5;
  string defaultValue = 6;
  ExtensionSettingType type = 7;
  optional string description = 8;
  optional string options = 9;
}
