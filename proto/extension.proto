syntax = "proto3";

package miru;

import "proto/extension_model.proto";

option go_package = "github.com/miru-project/miru-core/proto";

message SearchRequest {
  string pkg = 1;
  string kw = 2;
  int32 page = 3;
  string filter = 4;
}

message SearchResponse { repeated ExtensionListItem items = 1; }

message LatestRequest {
  string pkg = 1;
  int32 page = 2;
}

message LatestResponse { repeated ExtensionListItem items = 1; }

message DetailRequest {
  string pkg = 1;
  string url = 2;
}

message DetailResponse {
  ExtensionDetail data = 1;
}

message WatchRequest {
  string pkg = 1;
  string url = 2;
}

message WatchResponse {
  oneof data {
    ExtensionBangumiWatch bangumi = 1;
    ExtensionMangaWatch manga = 2;
    ExtensionFikushonWatch fikushon = 3;
    string raw = 4; // Backup or unknown watch type
  }
}

// Extension Management
message DownloadExtensionRequest {
  string repo_url = 1;
  string pkg = 2;
}
message DownloadExtensionResponse { string message = 1; }

message RemoveExtensionRequest { string pkg = 2; }
message RemoveExtensionResponse { string message = 1; }

message GetExtensionSettingsRequest { string pkg = 1; }
message GetExtensionSettingsResponse {
  repeated ExtensionSetting settings = 1;
}

message SaveExtensionSettingsRequest {
  string pkg = 1;
  repeated ExtensionSetting settings = 2;
}
message SaveExtensionSettingsResponse { string message = 1; }

service ExtensionService {
  rpc Search(SearchRequest) returns (SearchResponse);
  rpc Latest(LatestRequest) returns (LatestResponse);
  rpc Detail(DetailRequest) returns (DetailResponse);
  rpc Watch(WatchRequest) returns (WatchResponse);
  rpc DownloadExtension(DownloadExtensionRequest)
      returns (DownloadExtensionResponse);
  rpc RemoveExtension(RemoveExtensionRequest) returns (RemoveExtensionResponse);
  rpc GetExtensionSettings(GetExtensionSettingsRequest)
      returns (GetExtensionSettingsResponse);
  rpc SaveExtensionSettings(SaveExtensionSettingsRequest)
      returns (SaveExtensionSettingsResponse);
}
